<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0d0e12;
      --card-bg: #161820;
      --accent: #d4af37; /* Luxury Gold */
      --accent-hover: #bfa030;
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --border: #242736;
      --success: #10b981;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background-color: var(--bg-color); color: var(--text); padding: 40px 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .container { width: 100%; max-width: 480px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 32px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
    .header { margin-bottom: 28px; text-align: center; }
    .header h1 { font-size: 24px; font-weight: 500; letter-spacing: -0.5px; margin-bottom: 6px; color: var(--text); }
    .header p { color: var(--text-muted); font-size: 14px; }
    
    .mode-selector { display: flex; gap: 12px; margin-bottom: 24px; background: rgba(255,255,255,0.03); padding: 6px; border-radius: 10px; border: 1px solid var(--border); }
    .mode-btn { flex: 1; padding: 10px; background: transparent; border: none; color: var(--text-muted); border-radius: 6px; cursor: pointer; font-weight: 500; font-size: 14px; transition: all 0.2s ease; }
    .mode-btn.active { background: var(--accent); color: #000; font-weight: 600; }
    
    .form-group { margin-bottom: 20px; position: relative; }
    .form-group label { display: block; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 8px; font-weight: 600; }
    .form-group input, .form-group select { width: 100%; padding: 14px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 8px; color: #fff; font-size: 15px; transition: border-color 0.2s ease; }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent); }
    
    /* Live Item Banner Display */
    .item-preview-banner { background: rgba(212, 175, 55, 0.08); border-left: 3px solid var(--accent); padding: 12px 16px; border-radius: 4px; margin-bottom: 20px; display: none; }
    .item-preview-banner p { font-size: 13px; color: var(--text-muted); }
    .item-preview-banner h2 { font-size: 18px; color: var(--accent); font-weight: 500; margin-top: 2px; }

    .submit-btn { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 8px; color: #000; font-weight: 600; font-size: 16px; cursor: pointer; margin-top: 10px; transition: background 0.2s ease; }
    .submit-btn:hover { background: var(--accent-hover); }
    
    .notification { margin-top: 16px; padding: 12px; border-radius: 6px; text-align: center; font-size: 14px; display: none; }
    .notification.success { background: rgba(16, 185, 129, 0.15); color: var(--success); border: 1px solid var(--success); }
    .notification.error { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid #ef4444; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Lux Inventory Portal</h1>
    <p>Premium Real-Time Supply Chain Ledger</p>
  </div>

  <div class="mode-selector">
    <button class="mode-btn active" id="btn-purchased" onclick="setMode('purchased')">Purchased Mode</button>
    <button class="mode-btn" id="btn-received" onclick="setMode('received')">Received Mode</button>
  </div>

  <div class="form-group">
    <label>Barcode ID</label>
    <input type="text" id="barcode" placeholder="Scan or type barcode..." autocomplete="off" oninput="liveLookupItem(this.value)">
  </div>

  <div class="item-preview-banner" id="preview-banner">
    <p>Identified Catalog Item</p>
    <h2 id="preview-name">Loading...</h2>
  </div>

  <div class="form-group">
    <label>Item Manual Name</label>
    <input type="text" id="item-name" placeholder="Item descriptive name">
  </div>

  <div class="form-group">
    <label>Quantity</label>
    <input type="number" id="qty" value="1" min="1">
  </div>

  <div class="form-group">
    <label>Tracking Condition</label>
    <select id="condition">
      <option value="Good">Good Condition</option>
      <option value="Damaged">Damaged</option>
    </select>
  </div>

  <button class="submit-btn" onclick="submitData()">Commit Transaction</button>
  <div class="notification" id="toast"></div>
</div>

<script>
  let activeMode = 'purchased';
  let lookupTimeout = null;
  
  // YOUR APPSCRIPT WEB URL INTEGRATED HERE
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxGkyyPku1JwB9Xqm05L-M1mgFhPyaMoNwRTj7_Kcp4Y_ZQ1Sra3yYSmZ-2RBdfqedaAw/exec";

  function setMode(mode) {
    activeMode = mode;
    document.getElementById('btn-purchased').classList.toggle('active', mode === 'purchased');
    document.getElementById('btn-received').classList.toggle('active', mode === 'received');
    showNotification('', false);
  }

  // Live Lookups instantly before submitting data using your AppScript URL
  function liveLookupItem(barcode) {
    clearTimeout(lookupTimeout);
    const banner = document.getElementById('preview-banner');
    const nameField = document.getElementById('item-name');
    
    if (!barcode.trim()) {
      banner.style.display = 'none';
      return;
    }

    lookupTimeout = setTimeout(() => {
      // Direct call using the explicit Web App URL endpoint
      fetch(`${WEB_APP_URL}?action=lookup&barcode=${encodeURIComponent(barcode)}`)
        .then(response => response.json())
        .then(res => {
          if (res.status === "success") {
            banner.style.display = 'block';
            document.getElementById('preview-name').innerText = res.data.itemName;
            nameField.value = res.data.itemName; 
          } else {
            banner.style.display = 'none';
          }
        })
        .catch(err => {
          console.log("Fallback to native environment connection...");
          // Fallback to internal container routing if fetch experiences CORS flags
          if (typeof google !== 'undefined') {
            google.script.run.withSuccessHandler((responseJSON) => {
              const innerRes = JSON.parse(responseJSON);
              if (innerRes.status === "success") {
                banner.style.display = 'block';
                document.getElementById('preview-name').innerText = innerRes.data.itemName;
                nameField.value = innerRes.data.itemName;
              }
            }).doGet({ parameter: { action: 'lookup', barcode: barcode } });
          }
        });
    }, 300); 
  }

  function submitData() {
    const data = {
      code: document.getElementById('barcode').value, 
      barcode: document.getElementById('barcode').value,
      name: document.getElementById('item-name').value,
      qty: document.getElementById('qty').value,
      condition: document.getElementById('condition').value
    };

    if (!data.barcode || !data.name) {
      showNotification('Please fill in barcode and item name properties.', true);
      return;
    }

    // Commits data securely using internal container triggers
    if (typeof google !== 'undefined') {
      google.script.run.withSuccessHandler((responseStatus) => {
        showNotification('Transaction logged cleanly into spreadsheet ledger!', false);
        document.getElementById('barcode').value = '';
        document.getElementById('item-name').value = '';
        document.getElementById('qty').value = '1';
        document.getElementById('preview-banner').style.display = 'none';
      }).processTransaction(activeMode, data);
    } else {
      // Fallback alternative endpoint handling via POST requests
      fetch(WEB_APP_URL, {
        method: 'POST',
        body: JSON.stringify({ mode: activeMode, data: data })
      }).then(() => {
        showNotification('Transaction logged cleanly into spreadsheet ledger!', false);
      });
    }
  }

  function showNotification(msg, isError) {
    const toast = document.getElementById('toast');
    if (!msg) { toast.style.display = 'none'; return; }
    toast.style.display = 'block';
    toast.className = 'notification ' + (isError ? 'error' : 'success');
    toast.innerText = msg;
  }
</script>
</body>
</html>
