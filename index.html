<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        .scanner-container {
            position: relative;
            overflow: hidden;
            background-color: #000;
        }
        /* Custom horizontal red laser line to help guide manual alignments */
        .laser-guide {
            position: absolute;
            top: 50%;
            left: 5%;
            width: 90%;
            height: 2px;
            background-color: #ef4444;
            box-shadow: 0 0 8px #ef4444;
            z-index: 10;
            transform: translateY(-50%);
            pointer-events: none;
        }
        /* Style adjustments to make the library's internal video element responsive */
        #reader video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
        }
    </style>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-6 space-y-5 border border-gray-100">
        
        <div class="flex items-center justify-center space-x-2">
            <span class="text-2xl">📦</span>
            <h1 class="text-2xl font-bold text-blue-600 tracking-wide">Inventory Scanner</h1>
        </div>

        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Operation Mode</label>
            <select id="operationMode" onchange="handleModeChange(this.value)" class="w-full border border-gray-300 rounded-xl p-3 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="purchased">1. Purchased Order Mode</option>
                <option value="received">2. Received Order Mode</option>
            </select>
        </div>

        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Live Camera Viewfinder</label>
            <div class="scanner-container rounded-xl border border-gray-300 aspect-[4/3]">
                <div id="reader" class="w-full h-full"></div>
                <div class="laser-guide"></div>
            </div>
            
            <div class="flex items-center justify-between bg-slate-50 p-2 rounded-xl border border-gray-200 mt-2">
                <span class="text-xs text-gray-500 font-medium">Zoom Scale:</span>
                <input id="zoomSlider" type="range" min="1" max="4" step="0.1" value="1" class="w-2/3 accent-blue-600 cursor-pointer" oninput="applyZoom(this.value)">
                <span id="zoomVal" class="text-xs font-bold text-blue-600">1.0x</span>
            </div>
        </div>

        <form id="entryForm" onsubmit="submitTransaction(event)" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Barcode / PO Code Value</label>
                <input type="text" id="formBarcode" placeholder="Waiting for scan..." required class="w-full bg-gray-50 border border-gray-300 rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-700">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Item Name</label>
                <input type="text" id="formName" placeholder="e.g. Eye Drop 10ml" required class="w-full border border-gray-300 rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-700">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Quantity</label>
                <input type="number" id="formQty" min="1" value="1" required class="w-full border border-gray-300 rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-700">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Condition</label>
                <select id="formCondition" class="w-full border border-gray-300 rounded-xl p-3 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="Good">Good</option>
                    <option value="Not Good">Not Good</option>
                </select>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3.5 px-4 rounded-xl transition-colors shadow-md mt-2">
                Submit Entry
            </button>
        </form>
    </div>

    <script>
        // ==========================================================
        // PASTE YOUR EXTRACTED APPS SCRIPT DEPLOYMENT WEB URL HERE
        // ==========================================================
        const API_URL = "https://script.google.com/macros/s/AKfycbzlVG_onHo_P6AIJqBw093bUxg6U0giH5GmHr18vbFD8e2COel93zgQeRrS-1bglvSwyw/exec";

        let currentMode = 'purchased';
        let html5QrcodeScanner = null;
        
        // Software Debounce Settings
        let lastScannedBarcode = null;
        let lastScanTimestamp = 0;
        const DEBOUNCE_THRESHOLD = 2500; // Ignore re-scans for 2.5 seconds

        function handleModeChange(value) {
            currentMode = value;
            const nameInput = document.getElementById('formName');
            
            if (currentMode === 'purchased') {
                nameInput.disabled = false;
                nameInput.value = "";
                nameInput.placeholder = "e.g. Eye Drop 10ml";
                nameInput.classList.remove('bg-gray-50');
            } else {
                nameInput.disabled = true;
                nameInput.value = "";
                nameInput.placeholder = "Awaiting automated lookup...";
                nameInput.classList.add('bg-gray-50');
            }
        }

        // Camera Engine configured to balance old iOS devices and new high-res Android cameras
        function startUniversalScanner() {
            html5QrcodeScanner = new Html5Qrcode("reader");
            
            const config = { 
                fps: 24, 
                qrbox: (width, height) => {
                    // Optimized dimensions focusing specifically on wide 1D barcodes
                    return { width: Math.floor(width * 0.9), height: Math.floor(height * 0.4) }
                },
                experimentalFeatures: {
                    useBarCodeDetectorIfSupported: true
                }
            };

            // Constraint Profile 1: Strict Hardware-locked Environment Camera Request
            const strictConstraints = {
                videoConstraints: {
                    facingMode: { exact: "environment" },
                    width: { min: 1280, ideal: 1920 },
                    height: { min: 720, ideal: 1080 },
                    focusMode: "continuous",
                    advanced: [{ autoFocus: true }]
                },
                ...config
            };

            html5QrcodeScanner.start(
                { facingMode: { exact: "environment" } }, 
                strictConstraints,
                onScanSuccess
            ).catch(err => {
                console.warn("Strict camera mapping failed, entering standard camera fallback path...");
                
                // Constraint Profile 2: Soft Fallback for standard environments, cross-device compatibility (Safari/Older Androids)
                html5QrcodeScanner.start(
                    { facingMode: "environment" }, 
                    { fps: 20, qrbox: config.qrbox }, 
                    onScanSuccess
                ).catch(finalErr => {
                    alert("Unable to access any system camera. Please check app permissions.");
                });
            });
        }

        function applyZoom(val) {
            document.getElementById('zoomVal').innerText = parseFloat(val).toFixed(1) + 'x';
            const videoElement = document.querySelector("#reader video");
            if (videoElement) {
                videoElement.style.transform = `scale(${val})`;
            }
        }

        function onScanSuccess(decodedText) {
            const now = Date.now();
            if (decodedText === lastScannedBarcode && (now - lastScanTimestamp) < DEBOUNCE_THRESHOLD) {
                return; // Suppress duplicate trigger
            }
            
            lastScannedBarcode = decodedText;
            lastScanTimestamp = now;

            // Audio notification response
            playBeep();

            document.getElementById('formBarcode').value = decodedText;

            if (currentMode === 'received') {
                executeBackendLookup(decodedText);
            }
        }

        async function executeBackendLookup(barcode) {
            const nameInput = document.getElementById('formName');
            nameInput.value = "Searching Database...";
            
            try {
                const response = await fetch(`${API_URL}?action=lookup&barcode=${encodeURIComponent(barcode)}`);
                const result = await response.json();
                
                if (result.status === "success") {
                    nameInput.value = result.data.itemName;
                } else {
                    nameInput.value = "";
                    alert("System cross-reference lookup failed: Product record missing.");
                }
            } catch(e) {
                nameInput.value = "";
                alert("Network communication handling error.");
            }
        }

        async function submitTransaction(e) {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerText = "Submitting...";

            const payload = {
                mode: currentMode,
                data: {
                    code: document.getElementById('formBarcode').value, // Matches Code field requirements
                    barcode: document.getElementById('formBarcode').value,
                    name: document.getElementById('formName').value,
                    qty: document.getElementById('formQty').value,
                    condition: document.getElementById('formCondition').value
                }
            };

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                alert("Entry updated successfully!");
                clearForm();
            } catch(err) {
                alert("Error sending transaction payload.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Submit Entry";
            }
        }

        function clearForm() {
            document.getElementById('formBarcode').value = "";
            document.getElementById('formName').value = "";
            document.getElementById('formQty').value = "1";
            document.getElementById('formCondition').value = "Good";
            lastScannedBarcode = null;
            if (currentMode === 'received') {
                document.getElementById('formName').placeholder = "Awaiting automated lookup...";
            }
        }

        function playBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = "sine";
                osc.frequency.setValueAtTime(880, ctx.currentTime);
                gain.gain.setValueAtTime(0.05, ctx.currentTime);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.1);
            } catch(e) { console.log("Audio play blocked by browser interaction rules"); }
        }

        // Initialize camera routines once page DOM structures settle
        window.addEventListener('DOMContentLoaded', startUniversalScanner);
    </script>
</body>
</html>
